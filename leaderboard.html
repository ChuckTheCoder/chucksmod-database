<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Leaderboard</title>
    <style>
        /* 1. This stops padding from breaking the width! */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 2vw; /* Uses screen percentage instead of pixels */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            overflow-y: auto;
            overflow-x: hidden; /* Prevents side-scrolling */
        }

        .header {
            text-align: center;
            font-weight: 900;
            /* Shrinks to 16px on tiny screens, grows to 24px on big screens */
            font-size: clamp(16px, 5vw, 24px); 
            margin-bottom: 15px;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .player-row {
            display: flex;
            align-items: center;
            background-color: #2a2a2a;
            margin-bottom: 8px;
            padding: 2vw 3vw; /* Flexible padding */
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
            gap: 8px; /* Evenly spaces items without relying on margins */
        }

        .player-row:hover {
            transform: scale(1.02);
            background-color: #333;
        }

        .rank {
            /* Flexible font size */
            font-size: clamp(14px, 4vw, 18px);
            font-weight: bold;
            min-width: 25px; /* Ensures double digits fit */
            color: #888;
        }

        .rank-1 { color: #ffd700; text-shadow: 0 0 5px rgba(255,215,0,0.5); }
        .rank-2 { color: #c0c0c0; text-shadow: 0 0 5px rgba(192,192,192,0.5); }
        .rank-3 { color: #cd7f32; text-shadow: 0 0 5px rgba(205,127,50,0.5); }

        .pfp {
            /* Scales the image down gracefully in tight spaces */
            width: clamp(24px, 8vw, 40px);
            height: clamp(24px, 8vw, 40px);
            border-radius: 50%;
            object-fit: cover;
            background-color: #444;
            border: 2px solid #555;
            flex-shrink: 0; /* Prevents the image from getting squished into an oval */
        }

        .username {
            flex-grow: 1;
            font-size: clamp(12px, 4vw, 16px);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0; /* Forces flexbox to respect the ellipsis truncation */
        }

        .score {
            font-weight: bold;
            color: #4caf50;
            font-family: monospace;
            font-size: clamp(12px, 4vw, 18px);
            flex-shrink: 0; /* Ensures the score never gets cut off */
        }

        .loading {
            text-align: center;
            color: #888;
            font-style: italic;
            margin-top: 20px;
            font-size: clamp(12px, 4vw, 16px);
        }
    </style>
</head>
<body>

    <div class="header">🏆 Top Players</div>
    <div id="leaderboard-list">
        <div class="loading">Fetching data...</div>
    </div>

    <script>
        // --- PUT YOUR SUPABASE INFO HERE ---
        const SUPABASE_URL = 'https://lriizufytmdvxwcyjtqz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyaWl6dWZ5dG1kdnh3Y3lqdHF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzMzOTMsImV4cCI6MjA4NzgwOTM5M30.dDqU0McuLngEptd7vU3rqcE06qTKxDql4h44hFSGwBc';
        // -----------------------------------

        const leaderboardContainer = document.getElementById('leaderboard-list');
        const pfpCache = {};

        async function loadLeaderboard() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/fetch_global_leaderboard`, {
                    method: 'POST', 
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                if (!response.ok) throw new Error('Database error');
                const players = await response.json();

                if (players.length === 0) {
                    leaderboardContainer.innerHTML = '<div class="loading">No players found!</div>';
                    return;
                }

                // Save the player's current scroll position so the refresh doesn't jump them to the top
                const currentScroll = document.documentElement.scrollTop || document.body.scrollTop;

                let newHTML = '';
                
                players.forEach((player, index) => {
                    const rank = index + 1;
                    let rankClass = '';
                    if (rank === 1) rankClass = 'rank-1';
                    if (rank === 2) rankClass = 'rank-2';
                    if (rank === 3) rankClass = 'rank-3';

                    let imageSource = 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='; 
                    if (pfpCache[player.username]) {
                        imageSource = pfpCache[player.username];
                    }

                    newHTML += `
                        <div class="player-row">
                            <div class="rank ${rankClass}">#${rank}</div>
                            <img src="${imageSource}" class="pfp" id="pfp-${player.username}" />
                            <div class="username">${player.username}</div>
                            <div class="score">${player.total_clicks.toLocaleString()}</div>
                        </div>
                    `;
                });

                leaderboardContainer.innerHTML = newHTML;

                // Restore scroll position seamlessly
                document.documentElement.scrollTop = currentScroll;
                document.body.scrollTop = currentScroll;

                players.forEach(player => {
                    if (!pfpCache[player.username]) {
                        fetchCodeTorchPFP(player.username);
                    }
                });

            } catch (error) {
                console.error('Error fetching leaderboard:', error);
            }
        }

        async function fetchCodeTorchPFP(username) {
            try {
                const res = await fetch(`https://api.codetorch.net/v1/users/${username}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.pfp) {
                        pfpCache[username] = data.pfp;
                        const imgElement = document.getElementById(`pfp-${username}`);
                        if (imgElement) {
                            imgElement.src = data.pfp;
                        }
                    }
                }
            } catch (e) {
                console.log(`Could not load PFP for ${username}`);
            }
        }

        // Run immediately, then every 10 seconds
        loadLeaderboard();
        setInterval(loadLeaderboard, 10000); 
    </script>
</body>
</html>
