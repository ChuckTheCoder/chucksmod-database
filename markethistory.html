<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        #graphContainer {
            width: 100%;
            height: 100vh;
        }
        .loading {
            color: #888;
            text-align: center;
            padding-top: 20%;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">Loading Market Trends...</div>
    <canvas id="priceChart"></canvas>

    <script>
        // --- CONFIG ---
        const SUPABASE_URL = 'https://lriizufytmdvxwcyjtqz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyaWl6dWZ5dG1kdnh3Y3lqdHF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzMzOTMsImV4cCI6MjA4NzgwOTM5M30.dDqU0McuLngEptd7vU3rqcE06qTKxDql4h44hFSGwBc';

        // Get the item name from the URL (e.g. price_graph.html?item=rock)
        const urlParams = new URLSearchParams(window.location.search);
        const itemName = urlParams.get('item') || 'rock';

        async function loadGraph() {
            try {
                // FIXED: Using backticks and the variable for the URL
                const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/fetch_item_price_history`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({ target_item_name: itemName })
                });

                const data = await response.json();
                const loadingEl = document.getElementById('loading');
                
                if (data.length === 0) {
                    loadingEl.innerText = `No sales data for ${itemName} yet.`;
                    loadingEl.style.display = 'block';
                    return;
                }
                
                loadingEl.style.display = 'none';

                // Reverse data so it goes Oldest -> Newest for the X-axis
                const sortedData = data.reverse();
                const prices = sortedData.map(d => d.price);
                
                // Format dates to be shorter (e.g., "Mar 9")
                const labels = sortedData.map(d => {
                    const date = new Date(d.sold_at);
                    return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                });

                const ctx = document.getElementById('priceChart').getContext('2d');
                
                // Create a glowing gold gradient for the area under the line
                const gradient = ctx.createLinearGradient(0, 0, 0, 400);
                gradient.addColorStop(0, 'rgba(255, 204, 0, 0.4)');
                gradient.addColorStop(1, 'rgba(255, 204, 0, 0)');

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: `${itemName} Price History`,
                            data: prices,
                            borderColor: '#ffcc00',
                            backgroundColor: gradient,
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4, // Curvy line
                            pointRadius: 4,
                            pointBackgroundColor: '#ffffff',
                            pointHoverRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: '#222',
                                titleColor: '#ffcc00',
                                bodyColor: '#fff',
                                borderColor: '#444',
                                borderWidth: 1,
                                callbacks: {
                                    label: function(context) {
                                        return ' Price: ' + context.parsed.y.toLocaleString() + ' coins';
                                    }
                                }
                            }
                        },
                        scales: {
                            x: { 
                                grid: { color: '#333' },
                                ticks: { color: '#888' }
                            },
                            y: { 
                                grid: { color: '#333' },
                                ticks: { 
                                    color: '#4caf50', 
                                    font: { weight: 'bold' },
                                    callback: function(value) { return value.toLocaleString(); }
                                }
                            }
                        }
                    }
                });
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('loading').innerText = "Failed to fetch market data.";
            }
        }

        loadGraph();
    </script>
</body>
</html>
