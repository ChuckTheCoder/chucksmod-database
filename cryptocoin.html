<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Crypto Market</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0; 
            padding: 2vw; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a; 
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; 
        }

        /* --- NEW: HERO WALLET AT THE TOP --- */
        .wallet-container {
            display: none; /* Hidden unless ?username= is present */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at top, rgba(0, 229, 255, 0.1) 0%, transparent 80%);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px;
            padding: 3vh 2vw;
            margin-bottom: 15px;
            flex-shrink: 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .wallet-user-title {
            font-size: clamp(10px, 3vw, 14px);
            color: #00e5ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 900;
            margin-bottom: 5px;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
        }

        /* Massive, centered fiat value */
        .wallet-fiat-huge {
            font-size: clamp(36px, 10vw, 64px);
            font-family: monospace;
            font-weight: 900;
            color: #4caf50;
            line-height: 1;
            margin: 5px 0;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.6);
        }

        .wallet-crypto-row {
            font-size: clamp(14px, 4vw, 20px);
            color: white;
            font-family: monospace;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #333;
        }

        .tcoin-label { color: #888; font-size: 0.8em; margin-left: 4px; }

        /* --- MARKET HEADER --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
            flex-shrink: 0;
            padding: 0 5px;
        }

        .market-title {
            font-size: clamp(12px, 3.5vw, 16px); 
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .current-price {
            font-size: clamp(14px, 4vw, 20px);
            font-family: monospace;
            font-weight: bold;
            color: white;
        }

        .status-dot {
            display: inline-block; width: 8px; height: 8px;
            background-color: #00e5ff; border-radius: 50%;
            margin-right: 6px; box-shadow: 0 0 8px #00e5ff;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* --- GRAPH AREA --- */
        .chart-wrapper {
            position: relative;
            flex-grow: 1; 
            width: 100%;
            background-color: #222;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.5);
            padding: 10px;
            min-height: 0; 
        }
    </style>
</head>
<body>

    <div id="wallet-container" class="wallet-container">
        <div id="wallet-user" class="wallet-user-title">WALLET</div>
        <div id="wallet-fiat-value" class="wallet-fiat-huge">$0.00</div>
        <div class="wallet-crypto-row">
            <span id="wallet-crypto">0.0000</span><span class="tcoin-label">T-COIN</span>
        </div>
    </div>

    <div class="header-container">
        <div class="market-title"><span class="status-dot"></span> GLOBAL MARKET</div>
        <div class="current-price" id="live-price">$0.00 / T-COIN</div>
    </div>

    <div class="chart-wrapper">
        <canvas id="cryptoChart"></canvas>
    </div>

    <script>
        const SUPABASE_URL = 'https://lriizufytmdvxwcyjtqz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyaWl6dWZ5dG1kdnh3Y3lqdHF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzMzOTMsImV4cCI6MjA4NzgwOTM5M30.dDqU0McuLngEptd7vU3rqcE06qTKxDql4h44hFSGwBc';

        const dbHeaders = {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        };

        // --- URL PARSING FOR WALLET ---
        const urlParams = new URLSearchParams(window.location.search);
        const targetUsername = urlParams.get('username');

        // Unhide wallet and set title if username exists
        if (targetUsername) {
            document.getElementById('wallet-container').style.display = 'flex';
            document.getElementById('wallet-user').innerText = targetUsername.toUpperCase() + "'S PORTFOLIO";
        }

        // --- CHART SETUP ---
        const ctx = document.getElementById('cryptoChart').getContext('2d');
        let gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(0, 229, 255, 0.4)');
        gradient.addColorStop(1, 'rgba(0, 229, 255, 0.0)');

        const cryptoChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(50).fill(''), 
                datasets: [{
                    label: 'Market Price', data: [],
                    borderColor: '#00e5ff', backgroundColor: gradient,
                    borderWidth: 2, pointRadius: 0, pointHoverRadius: 6,
                    pointBackgroundColor: '#fff', fill: true, tension: 0.3
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                animation: { duration: 800, easing: 'easeOutQuart' },
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)', titleColor: '#00e5ff',
                        bodyFont: { family: 'monospace', size: 14 },
                        callbacks: {
                            label: function(context) { return '$' + Number(context.parsed.y).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 }); },
                            title: function() { return 'Transaction Price'; }
                        }
                    }
                },
                scales: {
                    x: { display: false },
                    y: {
                        display: true, position: 'right',
                        grid: { color: 'rgba(255, 255, 255, 0.05)', drawBorder: false },
                        ticks: { color: '#888', font: { family: 'monospace' }, callback: function(value) { return '$' + value; } }
                    }
                }
            }
        });

        // --- DATA FETCHING (POLLS EVERY 3 SECONDS) ---
        async function updateMarketData() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/fetch_crypto_history`, { method: 'POST', headers: dbHeaders });
                if (!res.ok) throw new Error('Failed to fetch crypto data');
                
                const data = await res.json();
                let latestPrice = 0;

                if (data && data.length > 0) {
                    const prices = data.map(tx => parseFloat(tx.price));
                    latestPrice = prices[prices.length - 1]; 
                    
                    cryptoChart.data.datasets[0].data = prices;
                    cryptoChart.data.labels = Array(prices.length).fill(''); 
                    cryptoChart.update();

                    document.getElementById('live-price').innerText = '$' + latestPrice.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' / T-COIN';
                }

                if (targetUsername && latestPrice > 0) {
                    const walletRes = await fetch(`${SUPABASE_URL}/rest/v1/rpc/fetch_crypto_wallet`, {
                        method: 'POST',
                        headers: dbHeaders,
                        body: JSON.stringify({ target_player_name: targetUsername })
                    });

                    if (walletRes.ok) {
                        const walletData = await walletRes.json();
                        const cryptoOwned = walletData.crypto_balance || 0;
                        
                        // FIX: Changed to the true liquidation value (Spot Price minus Curve Penalty)
                        const fiatValue = (cryptoOwned * latestPrice) - (0.05 * (cryptoOwned * cryptoOwned));

                        document.getElementById('wallet-crypto').innerText = cryptoOwned.toLocaleString(undefined, { maximumFractionDigits: 4 });
                        
                        // Prevent displaying negative numbers just in case of weird math
                        const safeFiatValue = fiatValue > 0 ? fiatValue : 0;
                        document.getElementById('wallet-fiat-value').innerText = '$' + safeFiatValue.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    }
                }

            } catch (err) {
                console.error('Market Error:', err);
            }
        }

        updateMarketData();
        setInterval(updateMarketData, 3000);
    </script>
</body>
</html>
